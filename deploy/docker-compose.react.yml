services:
  lafa-frontend:
    build:
      context: ..
      dockerfile: Dockerfile.react
    container_name: lafa-frontend
    ports:
      - "127.0.0.1:8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8501/_health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.lafa.description=LAFA Frontend - Longitudinal Assessment of Function Annotation"
      - "com.lafa.version=1.0.0"

networks:
  default:
    name: lafa-network
